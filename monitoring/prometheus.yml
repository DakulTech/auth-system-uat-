global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:8080']

  - job_name: 'cleanup'
    static_configs:
      - targets: ['cleanup:8080']

  - job_name: 'db'
    static_configs:
      - targets: ['db:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

rule_files:
  - "alerts.yml"
